services:
  db:
    image: postgres:16-alpine
    container_name: toast-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toast
    ports:
      - "5439:5432"
    volumes:
      - toast_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d toast"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: toast-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - toast_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toast-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://postgres:postgres@db:5432/toast
      REDIS_URL: redis://redis:6379
      EVENT_INGEST_MODE: ${EVENT_INGEST_MODE:-direct}
      EVENT_REDIS_FAILURE_MODE: ${EVENT_REDIS_FAILURE_MODE:-direct}
      EVENT_STREAM_KEY: ${EVENT_STREAM_KEY:-events:ingest}
      EVENT_CONSUMER_GROUP: ${EVENT_CONSUMER_GROUP:-events-workers}
      EVENT_BATCH_SIZE: ${EVENT_BATCH_SIZE:-200}
      EVENT_FLUSH_INTERVAL_MS: ${EVENT_FLUSH_INTERVAL_MS:-2000}
      EVENT_MAX_RETRIES: ${EVENT_MAX_RETRIES:-3}
      VITE_LIFF_ID: ${VITE_LIFF_ID:-}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      VITE_LIFF_AUTO_LOGIN: ${VITE_LIFF_AUTO_LOGIN:-false}
    ports:
      - "5000:5000"

volumes:
  toast_db_data:
  toast_redis_data:
