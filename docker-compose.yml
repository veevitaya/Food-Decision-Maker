services:
  db:
    image: postgres:16-alpine
    container_name: toast-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toast
    ports:
      - "5439:5432"
    volumes:
      - toast_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d toast"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toast-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://postgres:postgres@db:5432/toast
      VITE_LIFF_ID: ${VITE_LIFF_ID:-}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      VITE_LIFF_AUTO_LOGIN: ${VITE_LIFF_AUTO_LOGIN:-false}
    ports:
      - "5000:5000"

volumes:
  toast_db_data:
