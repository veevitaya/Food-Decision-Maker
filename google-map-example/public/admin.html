<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cached Places Admin</title>
    <link
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        background: #0f1824;
        color: #e7eef7;
      }
      header {
        padding: 12px 16px;
        background: #111927;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        gap: 12px;
        align-items: center;
      }
      select,
      input {
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: #0b1220;
        color: #e7eef7;
      }
      button {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(120deg, #13c1b6, #1d9bf0);
        color: #0b1d29;
        font-weight: 700;
        cursor: pointer;
      }
      main {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        height: calc(100vh - 56px);
      }
      #tableWrap {
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        font-size: 13px;
      }
      th {
        text-align: left;
        background: rgba(255, 255, 255, 0.04);
      }
      #map {
        height: 100%;
        width: 100%;
      }
      .pill {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
      }
      .pill.photo {
        background: rgba(19, 193, 182, 0.15);
        color: #7ef1e7;
      }
      .pill.nophoto {
        background: rgba(255, 255, 255, 0.08);
        color: #cdd8e6;
      }
    </style>
  </head>
  <body>
    <header>
      <div style="font-weight:700;">Cached Places</div>
      <label>Source
        <select id="source">
          <option value="">all</option>
          <option value="osm">osm</option>
          <option value="google">google</option>
        </select>
      </label>
      <label>Has photo
        <select id="hasPhoto">
          <option value="">all</option>
          <option value="true">yes</option>
          <option value="false">no</option>
        </select>
      </label>
      <label>Limit <input id="limit" type="number" value="200" style="width:70px;" /></label>
      <button id="reload">Reload</button>
      <div id="status" style="margin-left:auto;font-size:12px;color:#9fb4d4;"></div>
    </header>
    <main>
      <div id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Address</th>
              <th>Source</th>
              <th>Photo</th>
              <th>Photo URL</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div id="map"></div>
    </main>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
        center: [100.5018, 13.7563],
        zoom: 11,
      });
      map.addControl(new maplibregl.NavigationControl());
      const markers = [];

      async function load() {
        const params = new URLSearchParams();
        const src = document.getElementById("source").value;
        const hp = document.getElementById("hasPhoto").value;
        const limit = document.getElementById("limit").value || 200;
        params.set("limit", limit);
        if (src) params.set("source", src);
        if (hp) params.set("hasPhoto", hp);
        const res = await fetch(`/admin/places?${params.toString()}`);
        const json = await res.json();
        render(json.data || [], json);
      }

      function render(data, meta = {}) {
        markers.forEach((m) => m.remove());
        markers.length = 0;
        const tbody = document.getElementById("rows");
        tbody.innerHTML = "";
        data.forEach((p) => {
          const tr = document.createElement("tr");
          const hasPhoto = p.photos && p.photos.length;
          const firstPhoto = hasPhoto ? p.photos[0] : "";
          tr.innerHTML = `
            <td>${p.name || "-"}</td>
            <td>${p.address || "-"}</td>
            <td>${p.source || "-"}</td>
            <td>${hasPhoto ? '<span class="pill photo">yes</span>' : '<span class="pill nophoto">no</span>'}</td>
            <td style="max-width:260px;word-break:break-all;">
              ${hasPhoto ? `<div style="font-size:11px;color:#9fb4d4;">${p.photos.length} photos</div>
              <a href="${firstPhoto}" target="_blank" style="color:#7ee0ff;">${firstPhoto}</a>` : "-"}
            </td>
          `;
          tbody.appendChild(tr);
          const el = document.createElement("div");
          el.style.width = "18px";
          el.style.height = "18px";
          el.style.borderRadius = "50%";
          el.style.background = p.photos && p.photos.length ? "#ff6b6b" : "#13c1b6";
          el.style.border = "2px solid white";
          const m = new maplibregl.Marker({ element: el })
            .setLngLat([p.lon, p.lat])
            .addTo(map);
          markers.push(m);
        });
        if (data.length > 0) {
          const center = data[0];
          map.flyTo({ center: [center.lon, center.lat], zoom: 12 });
        }
        document.getElementById("status").textContent = meta.totalFiltered
          ? `Showing ${data.length}/${meta.totalFiltered} (scanned ${meta.scanned})`
          : `Loaded ${data.length}`;
      }

      document.getElementById("reload").addEventListener("click", load);
      document.getElementById("source").addEventListener("change", load);
      document.getElementById("hasPhoto").addEventListener("change", load);
      document.getElementById("limit").addEventListener("change", load);
      load().catch(console.error);
    </script>
  </body>
</html>
